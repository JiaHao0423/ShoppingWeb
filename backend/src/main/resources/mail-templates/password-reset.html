<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>重設密碼</title>
</head>
<body style="margin:0;padding:0;background:#f5f7fb;font-family:Arial,'Noto Sans TC',sans-serif;color:#1f2937;">
  <table role="presentation" width="100%" cellspacing="0" cellpadding="0" style="padding:24px 12px;">
    <tr>
      <td align="center">
        <table role="presentation" width="100%" cellspacing="0" cellpadding="0" style="max-width:560px;background:#ffffff;border-radius:14px;overflow:hidden;border:1px solid #e5e7eb;">
          <tr>
            <td style="background:linear-gradient(135deg,#111827,#374151);padding:20px 24px;">
              <h1 style="margin:0;font-size:20px;color:#ffffff;">ShoppingWeb 安全通知</h1>
            </td>
          </tr>
          <tr>
            <td style="padding:24px;">
              <p style="margin:0 0 12px;font-size:15px;line-height:1.6;">我們收到您的密碼重設請求。</p>
              <p style="margin:0 0 20px;font-size:15px;line-height:1.6;">請點擊下方按鈕以重設密碼，此連結將於 <strong>30 分鐘</strong> 後失效。</p>
              <p style="margin:0 0 20px;">
                <a href="{{RESET_LINK}}" style="display:inline-block;padding:12px 18px;border-radius:10px;background:#111827;color:#ffffff;text-decoration:none;font-weight:600;">
                  立即重設密碼
                </a>
              </p>
              <p style="margin:0 0 10px;font-size:13px;color:#6b7280;line-height:1.6;">如果按鈕無法點擊，請將以下連結貼到瀏覽器：</p>
              <p style="margin:0 0 16px;font-size:13px;word-break:break-all;color:#374151;">{{RESET_LINK_TEXT}}</p>
              <p style="margin:0;font-size:13px;color:#6b7280;line-height:1.6;">若這不是您本人操作，請忽略此信件並盡快檢查帳號安全。</p>
            </td>
          </tr>
        </table>
      </td>
    </tr>
  </table>
</body>
</html>
